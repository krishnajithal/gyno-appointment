{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="row justify-content-center mt-4">
    <div class="col-md-5">

        <div class="glass-card p-4 shadow-sm">
            <h2 class="text-center fw-bold mb-4 text-primary">Login</h2>

            <!-- SUCCESS MESSAGE -->
            {% if messages %}
                {% for msg in messages %}
                    <div class="alert alert-success text-center py-2 mb-3" style="border-radius:10px;">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- ERROR MESSAGE -->
            {% if error %}
                <div class="alert alert-danger text-center py-2 mb-3" style="border-radius:10px;">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" required placeholder="Enter username">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required placeholder="Enter password">
                </div>

                <button type="submit" class="btn submit-btn w-100 py-2 mt-2">
                    Login
                </button>
            </form>

            <p class="text-center mt-3 mb-0 text-muted">
                Don't have an account?  
                <a href="{% url 'register' %}" class="fw-bold">Register</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
