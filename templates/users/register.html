{% extends 'base.html' %}

{% load static %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card glass-card p-4">

            <h2 class="fw-bold text-center mb-3">Create Your Account</h2>
            <p class="text-muted text-center mb-4">
                Register to book appointments and manage your medical visits easily.
            </p>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

               <div class="mb-3">
                    <label class="form-label fw-semibold">Register As</label>
                    {{ form.role }}
                </div>

                <button class="btn submit-btn w-100 py-2">Create Account</button>
            </form>

            <p class="text-center mt-3">
                Already have an account?
                <a href="{% url 'login' %}" class="text-primary fw-semibold">Login</a>
            </p>

        </div>
        
    </div>
</div>

{% endblock %}
