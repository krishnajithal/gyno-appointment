{% extends 'base.html' %}

{% block content %}

<div class="text-center mb-5">
    <h1 class="fw-bold text-primary mb-3">
        Welcome to <span class="text-dark">GynoCare</span>
    </h1>
    <p class="text-muted fs-5">
        Your trusted platform for managing gynecology appointments with ease.
    </p>
</div>

<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center py-4">
                <i class="fa-solid fa-user-doctor text-primary fa-3x mb-3"></i>
                <h4 class="fw-bold mb-3">Doctor Login</h4>
                <a href="{% url 'login' %}" class="btn btn-primary btn-lg w-100 premium-btn">
                    Login as Doctor
                </a>
            </div>
        </div>
    </div>

    <div class="col-md-4 mt-4 mt-md-0">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center py-4">
                <i class="fa-solid fa-hospital-user text-success fa-3x mb-3"></i>
                <h4 class="fw-bold mb-3">Patient Login</h4>
                <a href="{% url 'login' %}" class="btn btn-success btn-lg w-100 premium-btn">
                    Login as Patient
                </a>
            </div>
        </div>
    </div>
</div>

<div class="text-center mt-5">
    <p class="text-muted">
        New here?  
        <a href="{% url 'register' %}" class="fw-bold">Create an account</a>
    </p>
</div>
{% endblock %}
