{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- HERO SECTION -->
<div class="row align-items-center justify-content-center py-5">
    <div class="col-md-6 text-center text-md-start">

        <h1 class="fw-bold display-5 mb-3 text-primary">
            Welcome to <span class="text-dark">GynoCare</span>
        </h1>

        <p class="lead text-muted mb-4">
            A modern and easy-to-use appointment system designed to simplify your medical visit scheduling.
        </p>

        <div class="mt-4">
            <a href="{% url 'login' %}" class="btn submit-btn px-4 py-2 me-2">
                Login
            </a>

            <a href="{% url 'register' %}" class="btn btn-outline-primary px-4 py-2 fw-semibold"
               style="border-radius: 12px;">
                Register
            </a>
        </div>

    </div>

    <div class="col-md-5 mt-4 mt-md-0 text-center">
        <img src="{% static 'images/Gynocare-logo.webp' %}" alt="Doctor illustration"
             class="img-fluid" style="max-width: 50%;">
    </div>
</div>

{% endblock %}
