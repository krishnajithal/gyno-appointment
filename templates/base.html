<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title|default:"Gyno Appointment System" }}</title>

    <!-- BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ✅ GLOBAL BADGE STYLES (Add here) -->
    <style>
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
        }

        .status-pending { background: #f0ad4e; }
        .status-approved { background: #0d6efd; }
        .status-completed { background: #28a745; }
        .status-cancelled { background: #dc3545; }
    </style>
    <!-- ✅ END BADGE STYLES -->

</head>
<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">GynoCare</a>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    
                    {% if user.is_authenticated %}
                        
                        {% if user.profile.role == "doctor" %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'doctor_dashboard' %}">Doctor Dashboard</a>
                        </li>
                        {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'patient_dashboard' %}">Patient Dashboard</a>
                        </li>
                        {% endif %}
                        
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                        </li>

                    {% endif %}

                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
